<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script src="https://unpkg.com/lucide@latest"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Educativo Tupi-Guarani</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
    h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 1.2s ease-out forwards; }

    .reveal { opacity: 0; transform: translateY(40px); transition: all 1s ease; }
    .reveal.active { opacity: 1; transform: translateY(0); }
    
    .hero-overlay { background: rgba(0, 0, 0, 0.4); }
  </style>
</head>

<body class="bg-gradient-to-b from-[#f5e1ce] to-[#ffffff] text-gray-800">

  <header class="bg-white/80 backdrop-blur sticky top-0 z-50 shadow-sm">
    <div class="max-w-6xl mx-auto flex justify-between items-center p-4">
      <h1 class="text-xl md:text-2xl font-bold text-[#6b5440]">Tupi-Guarani</h1>

      <nav class="hidden md:flex space-x-6 text-gray-700 font-medium">
        <a href="#inicio" class="hover:text-[#b08e6b] transition">Início</a>
        <a href="#materiais" class="hover:text-[#b08e6b] transition">Arquivos</a>
        <a href="#sobre" class="hover:text-[#b08e6b] transition">Sobre</a>
      </nav>

      <!-- 🔥 NOVO BLOCO COM ÍCONES (SEM ALTERAR O RESTO) -->
      <div class="flex items-center gap-3">

        <a href="https://instagram.com/seuusuario" target="_blank"
           class="bg-gray-100 p-2 rounded-full hover:bg-pink-500 hover:text-white transition transform hover:scale-110">
          <i data-lucide="instagram" class="w-5 h-5"></i>
        </a>

        <a href="https://facebook.com/seuusuario" target="_blank"
           class="bg-gray-100 p-2 rounded-full hover:bg-blue-500 hover:text-white transition transform hover:scale-110">
          <i data-lucide="facebook" class="w-5 h-5"></i>
        </a>

        <a href="https://youtube.com/seuusuario" target="_blank"
           class="bg-gray-100 p-2 rounded-full hover:bg-red-500 hover:text-white transition transform hover:scale-110">
          <i data-lucide="youtube" class="w-5 h-5"></i>
        </a>

        <button class="bg-[#b08e6b] text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-[#8c6f52] transition">
          Contato
        </button>

      </div>
      <!-- 🔥 FIM -->

    </div>
  </header>

  <section id="inicio" class="relative text-center py-24 md:py-32 px-4 bg-cover bg-center flex items-center justify-center min-h-[70vh]" style="background-image: url('capaeu.jpeg');">
    <div class="absolute inset-0 bg-black/30"></div> <div class="relative max-w-3xl mx-auto fade-up text-white">
      <h2 class="text-4xl md:text-6xl font-bold leading-tight drop-shadow-lg">
        Preservando a identidade indígena por meio da educação
      </h2>
      <p class="mt-6 text-lg md:text-xl text-gray-100 drop-shadow-md">
        Um espaço dedicado a educadores e multiplicadores da cultura do povo Tupi-Guarani.
      </p>
      <a href="#sobre" class="inline-block mt-8 bg-[#b08e6b] hover:bg-[#8c6f52] text-white px-8 py-3 rounded-full shadow-xl transition transform hover:scale-105">
        Conheça nossa missão
      </a>
    </div>
  </section>

</body>
</html>
