<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Educativo Tupi-Guarani</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }

@keyframes fadeUp {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}

.fade-up { animation: fadeUp 1.2s ease-out forwards; }

.reveal { opacity: 0; transform: translateY(40px); transition: all 1s ease; }
.reveal.active { opacity: 1; transform: translateY(0); }

.hero-overlay { background: rgba(0, 0, 0, 0.4); }

.social-container {
display: flex;
justify-content: center;
gap: 25px;
margin-bottom: 30px;
}

.icon-social {
font-size: 28px;
color: #EE9A49;
transition: all 0.3s ease;
text-decoration: none;
}

.icon-social:hover {
transform: translateY(-5px);
}

.fa-instagram:hover {
background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}

.fa-youtube:hover { color: #FF0000; }
.fa-facebook:hover { color: #1877F2; }
.fa-pinterest:hover { color: #E60023; }

.btn-galeria {
transition: all 0.5s ease-out;
}

.btn-galeria:active {
transform: scale(1.4);
opacity: 0;
filter: blur(10px);
transition: 0.4s;
}

#textoGaleria span {
display: inline-block;
transition: all 0.5s ease;
}

.letra-sumir {
opacity: 0;
transform: translateY(-40px) rotate(20deg) scale(1.5);
filter: blur(6px);
}

[vw]{
right:15px !important;
bottom:90px !important;
z-index:9999;
}
</style>
</head>

<body class="bg-gradient-to-b from-[#FFFFE0] to-[#FAFAD2] text-gray-800">

<header class="bg-white backdrop-blur sticky top-0 z-50 shadow-sm">
<div class="max-w-6xl mx-auto flex justify-between items-center p-4">

<nav class="flex space-x-6 text-gray-700 font-medium order-2 md:order-1"></nav>

<div class="order-1 md:order-2">
<div class="h-12 md:h-16 w-auto">

<img id="logoImg"
src="mainolindinho.jpeg"
class="h-12 md:h-16 w-auto object-contain">

<video id="logoVideo"
src="mainolindinhovideo.mp4"
class="h-12 md:h-16 w-auto object-contain hidden"
playsinline>
</video>

</div>
</div>

<div class="order-3">
<a href="saiba-mais.htm"
class="inline-block bg-[#B8860B] hover:bg-[#FFD700] text-white px-4 py-2 rounded-full shadow-xl transition transform hover:scale-105 font-bold uppercase tracking-wider text-sm">
Saiba mais
</a>
</div>

</div>
</header>

<section id="inicio" class="relative text-center py-24 md:py-32 px-4 bg-cover bg-center flex items-center justify-center min-h-[70vh]" style="background-image: url('capaeu.jpeg');">

<div class="absolute inset-0 bg-black/30"></div>

<div class="relative max-w-3xl mx-auto fade-up text-white">

<h2 class="text-4xl md:text-6xl font-bold leading-tight drop-shadow-lg">
Preservando a identidade indígena por meio da educação
</h2>

<p class="mt-6 text-lg md:text-xl text-gray-100 drop-shadow-md">
Um espaço dedicado a educadores indígenas e multiplicadores da cultura do povo Tupi-Guarani.
</p>

<a href="galeria.html" id="btnGaleria"
class="btn-galeria inline-block mt-8 bg-[#B8860B] hover:bg-[#DAA520] text-[#EEDD82] px-8 py-3 rounded-full shadow-xl transition transform hover:scale-105 font-bold uppercase tracking-wider">

<span id="textoGaleria">Explorar Galeria Cultural</span>

</a>

</div>
</section>

<!-- RESTANTE DO SEU HTML CONTINUA IGUAL -->
<!-- NÃO FOI ALTERADO -->

<script>
document.addEventListener("DOMContentLoaded", function(){

const botao = document.getElementById("btnGaleria");
const texto = document.getElementById("textoGaleria");

if(botao){
botao.addEventListener("click", function(e){
e.preventDefault();
const destino = this.getAttribute("href");

const letras = texto.innerText.split("");
texto.innerHTML="";

letras.forEach((l,i)=>{
const span=document.createElement("span");
span.innerText=l;
texto.appendChild(span);

setTimeout(()=>span.classList.add("letra-sumir"), i*40);
});

setTimeout(()=>{
window.location.href=destino;
}, letras.length*40+600);
});
}

});
</script>

<script>
document.addEventListener("DOMContentLoaded", function(){

const logoImg = document.getElementById("logoImg");
const logoVideo = document.getElementById("logoVideo");

let animando = false;

document.addEventListener("click", function(e){

const link = e.target.closest("a,button");
if(!link) return;

const href = link.getAttribute("href");
if(!href) return;

if(animando) return;
animando = true;

e.preventDefault();

logoImg.classList.add("hidden");
logoVideo.classList.remove("hidden");

logoVideo.currentTime = 0;
logoVideo.play();

logoVideo.onended = function(){
window.location.href = href;
};

});

});
</script>

</html>
