<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Educativo Tupi-Guarani</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
    h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 1.2s ease-out forwards; }

    .reveal { opacity: 0; transform: translateY(40px); transition: all 1s ease; }
    .reveal.active { opacity: 1; transform: translateY(0); }

    .hero-overlay { background: rgba(0, 0, 0, 0.4); }

    .social-container {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin-bottom: 30px;
    }

    .icon-social {
      font-size: 28px;
      color: #9ca3af;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .icon-social:hover { transform: translateY(-5px); }

    .fa-instagram:hover {
      background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .fa-youtube:hover { color: #FF0000; }
    .fa-facebook:hover { color: #1877F2; }
    .fa-pinterest:hover { color: #E60023; }

    .btn-galeria { transition: all 0.5s ease-out; }

    .btn-galeria:active {
      transform: scale(1.4);
      opacity: 0;
      filter: blur(10px);
      transition: 0.4s;
    }

    @media (max-width: 768px) {
      #inicio { background-position: 20% center; }
    }

    #textoGaleria span {
      display: inline-block;
      transition: all 0.5s ease;
    }

    .letra-sumir {
      opacity: 0;
      transform: translateY(-40px) rotate(20deg) scale(1.5);
      filter: blur(6px);
    }
  </style>
</head>

<body class="bg-gradient-to-b from-[#f5e1ce] to-[#ffffff] text-gray-800">

<header class="bg-white backdrop-blur sticky top-0 z-50 shadow-sm">
<div class="max-w-6xl mx-auto flex justify-between items-center p-4">

<div class="order-1 md:order-2">
<a href="index.html">
<img src="mainologo.jpeg" class="h-12 md:h-16">
</a>
</div>

<div class="order-3">
<a href="sobre-idealizadora.html" class="bg-[#f5e1ce] px-4 py-2 rounded-full font-bold">
Saíba mais
</a>
</div>

</div>
</header>

<section id="materiais" class="max-w-6xl mx-auto px-6 py-12">

<div class="grid grid-cols-1 md:grid-cols-3 gap-8 reveal">

<!-- CARD 1 -->
<div class="bg-white rounded-2xl shadow-lg p-6">
<div class="bg-[#f5e1ce] rounded-xl mb-4 p-2">
<a href="capavocabulario.png" target="_blank">
<img src="capavocabulario.png" class="w-full hover:scale-105 transition">
</a>
</div>

<button onclick="abrirPDF('capa-vocabulario.pdf')" class="w-full bg-[#b08e6b] text-white py-3 rounded">
Prévia
</button>
</div>

<!-- CARD 2 -->
<div class="bg-white rounded-2xl shadow-lg p-6">
<div class="bg-[#f5e1ce] rounded-xl mb-4 p-2">
<a href="kwatiamandua.png" target="_blank">
<img src="kwatiamandua.png" class="w-full hover:scale-105 transition">
</a>
</div>

<button onclick="abrirPDF('capacartaomemorizacao.pdf')" class="w-full bg-[#b08e6b] text-white py-3 rounded">
Prévia
</button>
</div>

<!-- CARD 3 -->
<div class="bg-white rounded-2xl shadow-lg p-6">
<div class="bg-[#f5e1ce] rounded-xl mb-4 p-2">
<a href="nhemboenhanderupi.jpeg" target="_blank">
<img src="nhemboenhanderupi.jpeg" class="w-full hover:scale-105 transition">
</a>
</div>

<button onclick="abrirPDF('nhemboenhanderupi.pdf')" class="w-full bg-[#b08e6b] text-white py-3 rounded">
Prévia
</button>
</div>

</div>
</section>

<!-- MODAL PDF -->
<div id="pdfModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">
<div class="bg-white w-[95%] md:w-[80%] h-[90%] rounded-2xl overflow-hidden relative">
<button onclick="fecharPDF()" class="absolute top-3 right-4 text-2xl">✕</button>
<iframe id="pdfViewer" class="w-full h-full"></iframe>
</div>
</div>

<script>
function abrirPDF(arquivo) {
const modal = document.getElementById("pdfModal");
const viewer = document.getElementById("pdfViewer");

viewer.src = arquivo;
modal.classList.remove("hidden");
modal.classList.add("flex");
}

function fecharPDF() {
const modal = document.getElementById("pdfModal");
const viewer = document.getElementById("pdfViewer");

viewer.src = "";
modal.classList.add("hidden");
}
</script>

</body>
</html>
